        required: false
        schema:
          type: string
          default: AFFINITY_DESC
          enum:
          - AFFINITY_DESC
          - RATING_DESC
          - NAME_ASC
          - DISTANCE_ASC
          - CREATED_AT_DESC
      - in: query
        name: includeOwn
        required: false
        schema:
          type: boolean
          default: false
      - in: query
        name: lat
        required: false
        schema:
          type: number
          format: double
          maximum: 90.0
          minimum: -90.0
      - in: query
        name: lng
        required: false
        schema:
          type: number
          format: double
          maximum: 180.0
          minimum: -180.0
      - in: query
        name: tag
        required: false
        schema:
          type: array
          items:
            type: string
            maxLength: 650
            minLength: 0
            pattern: "^[a-z0-9]+(-[a-z0-9]+)*(,[a-z0-9]+(-[a-z0-9]+)*)*$"
          maxItems: 10
