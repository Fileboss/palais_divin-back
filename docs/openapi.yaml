  /api/v1/user/restaurants/{restaurantId}/photos:
    post:
      operationId: register
      parameters:
      - in: path
        name: restaurantId
        required: true
        schema:
          type: string
          format: uuid
      - in: header
        name: Idempotency-Key
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPhotoRequest"
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PhotoResponse"
          description: OK
