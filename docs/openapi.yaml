  /api/v1/public/restaurants:
    get:
      operationId: list_4
      parameters:
      - in: query
        name: cursor
        required: false
        schema:
          type: string
      - in: query
        name: size
        required: false
        schema:
          type: integer
          format: int32
          default: 20
          maximum: 100
          minimum: 1
      - in: query
        name: sort
        required: false
        schema:
          type: string
          default: CREATED_AT_DESC
          enum:
          - CREATED_AT_DESC
          - RATING_DESC
          - NAME_ASC
          - DISTANCE_ASC
          - AFFINITY_DESC
      - in: query
        name: tag
        required: false
        schema:
          type: array
          items:
            type: string
            maxLength: 650
            minLength: 0
            pattern: "^[a-z0-9]+(-[a-z0-9]+)*(,[a-z0-9]+(-[a-z0-9]+)*)*$"
          maxItems: 10
          minItems: 0
      - in: query
        name: name
        required: false
        schema:
          type: string
          maxLength: 100
          minLength: 0
      - in: query
        name: lat
        required: false
        schema:
          type: number
          format: double
          maximum: 90.0
          minimum: -90.0
      - in: query
        name: lng
        required: false
        schema:
          type: number
          format: double
          maximum: 180.0
          minimum: -180.0
      - in: query
        name: dineIn
        required: false
        schema:
          type: boolean
      - in: query
        name: takeOut
        required: false
        schema:
          type: boolean
      - in: query
        name: delivery
        required: false
        schema:
          type: boolean
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RestaurantsPageResponse"
          description: OK
      tags:
      - public-restaurant-rest-controller
  /api/v1/public/restaurants/{id}:
