components:
  schemas:
    AuthorReviewResponse:
      type: object
      properties:
        comment:
          type: string
        createdAt:
          type: string
          format: date-time
        rating:
          type: integer
          format: int32
        restaurant:
          $ref: "#/components/schemas/AuthorReviewRestaurantRef"
        reviewId:
          type: string
          format: uuid
    AuthorReviewRestaurantRef:
      type: object
      properties:
        address:
          type: string
        id:
          type: string
          format: uuid
        name:
          type: string
    AuthorReviewsPageResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuthorReviewResponse"
        page:
          $ref: "#/components/schemas/PageMeta"
    CategoryGroup:
      type: object
      properties:
        category:
          type: string
          enum:
          - REGIME
          - TYPE
          - SPECIALTY
          - VENUE_TYPE
          - SERVICE_AND_PLACE
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagResponse"
    ConnectionResponse:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        sourceUserId:
          type: string
          format: uuid
        targetUserId:
          type: string
          format: uuid
    CoordinatesDto:
      type: object
      properties:
        latitude:
          type: number
          format: double
          maximum: 90
          minimum: -90
        longitude:
          type: number
          format: double
          maximum: 180
          minimum: -180
      required:
      - latitude
      - longitude
    CreateRestaurantRequest:
      type: object
      properties:
        address:
          type: string
          minLength: 1
        delivery:
          type: boolean
        dineIn:
          type: boolean
        name:
          type: string
          minLength: 1
        takeOut:
          type: boolean
      required:
      - address
      - name
    CreateReviewRequest:
      type: object
      properties:
        comment:
          type: string
          maxLength: 1000
          minLength: 0
        rating:
          type: integer
          format: int32
          maximum: 5
          minimum: 1
    CreateTagImplicationRequest:
      type: object
      properties:
        impliesTagId:
          type: string
          format: uuid
        tagId:
          type: string
          format: uuid
      required:
      - impliesTagId
      - tagId
    CreateTagRequest:
      type: object
      properties:
        category:
          type: string
          enum:
          - REGIME
          - TYPE
          - SPECIALTY
          - VENUE_TYPE
          - SERVICE_AND_PLACE
        label:
          type: string
          maxLength: 127
          minLength: 0
        labelI18n:
          type: object
          additionalProperties:
            type: string
        slug:
          type: string
          maxLength: 64
          minLength: 0
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
      required:
      - category
      - label
      - slug
    InvitationResponse:
      type: object
      properties:
        expiresAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        signupUrl:
          type: string
    PageMeta:
      type: object
      properties:
        hasNext:
          type: boolean
        nextCursor:
          type: string
        size:
          type: integer
          format: int32
    PhotoDownloadUrlResponse:
      type: object
      properties:
        downloadUrl:
          type: string
        expiresAt:
          type: string
          format: date-time
        objectKey:
          type: string
    PhotoResponse:
      type: object
      properties:
        authorId:
          type: string
          format: uuid
        contentType:
          type: string
        createdAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        objectKey:
          type: string
        restaurantId:
          type: string
          format: uuid
    PhotoSummaryResponse:
      type: object
      properties:
        expiresAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        url:
          type: string
    PhotoUploadUrlResponse:
      type: object
      properties:
        expiresAt:
          type: string
          format: date-time
        objectKey:
          type: string
        uploadUrl:
          type: string
    PhotosPageResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PhotoSummaryResponse"
        page:
          $ref: "#/components/schemas/PageMeta"
    PingResponse:
      type: object
      properties:
        status:
          type: string
        ts:
          type: string
          format: date-time
    PublicUserResponse:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        displayName:
          type: string
        id:
          type: string
          format: uuid
    RecommendationResponse:
      type: object
      properties:
        address:
          type: string
        affinity:
          type: number
          format: double
        avgRating:
          type: number
          format: double
        distanceMetres:
          type: number
          format: double
        id:
          type: string
          format: uuid
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        name:
          type: string
        recommenderCount:
          type: integer
          format: int32
    RecommendationsPageResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/RecommendationResponse"
        page:
          $ref: "#/components/schemas/PageMeta"
    RegisterPhotoRequest:
      type: object
      properties:
        contentType:
          type: string
          maxLength: 127
          minLength: 0
        objectKey:
          type: string
          maxLength: 512
          minLength: 0
      required:
      - contentType
      - objectKey
    RestaurantAffinityResponse:
      type: object
      properties:
        affinity:
          type: number
          format: double
        recommenderCount:
          type: integer
          format: int32
        restaurantId:
          type: string
          format: uuid
    RestaurantResponse:
      type: object
      properties:
        address:
          type: string
        affinity:
          type: number
          format: double
        avgRating:
          type: number
          format: double
        createdAt:
          type: string
          format: date-time
        delivery:
          type: boolean
        dineIn:
          type: boolean
        distanceMetres:
          type: number
          format: double
        id:
          type: string
          format: uuid
        location:
          $ref: "#/components/schemas/CoordinatesDto"
        name:
          type: string
        reviewCount:
          type: integer
          format: int64
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagSummary"
        takeOut:
          type: boolean
        thumbnail:
          $ref: "#/components/schemas/ThumbnailSummary"
    RestaurantTagResponse:
      type: object
      properties:
        attachedAt:
          type: string
          format: date-time
        attachedBy:
          type: string
          format: uuid
        restaurantId:
          type: string
          format: uuid
        tagId:
          type: string
          format: uuid
    RestaurantsPageResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/RestaurantResponse"
        page:
          $ref: "#/components/schemas/PageMeta"
    ReviewResponse:
      type: object
      properties:
        authorDisplayName:
          type: string
        authorId:
          type: string
          format: uuid
        comment:
          type: string
        createdAt:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
        rating:
          type: integer
          format: int32
        restaurantId:
