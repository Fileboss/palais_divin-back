      - recommendation-rest-controller
  /api/v1/user/restaurants:
    post:
      operationId: create_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRestaurantRequest"
        required: true
      responses:
