  /api/v1/user/restaurants/{restaurantId}/reviews:
    get:
      operationId: getMyReview
      parameters:
      - in: path
        name: restaurantId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReviewResponse"
          description: OK
      tags:
      - review-rest-controller
    post:
      operationId: create
      parameters:
      - in: path
        name: restaurantId
        required: true
        schema:
          type: string
          format: uuid
      - in: header
        name: Idempotency-Key
        required: false
