spring.application.name=palaisdivin-backend
# Without SPRING_PROFILES_ACTIVE, the dev profile activates locally so application-dev.properties
# supplies the Keycloak client secret + signup URL. Prod MUST set SPRING_PROFILES_ACTIVE=prod and
# provide KEYCLOAK_BACKEND_CLIENT_SECRET + APP_INVITATION_SIGNUP_BASE_URL via env.
spring.profiles.default=dev
spring.threads.virtual.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
springdoc.writer-with-order-by-keys=true
springdoc.writer-with-default-pretty-printer=true
app.ban.base-url=https://api-adresse.data.gouv.fr
app.ban.timeout=2s
app.ban.cache-ttl=24h
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/palaisdivin}
app.keycloak.base-url=${KEYCLOAK_BASE_URL:http://localhost:8081}
app.keycloak.realm=${KEYCLOAK_REALM:palaisdivin}
app.keycloak.client-id=${KEYCLOAK_BACKEND_CLIENT_ID:palais-divin-backend}
app.keycloak.client-secret=${KEYCLOAK_BACKEND_CLIENT_SECRET:}
app.keycloak.timeout=${KEYCLOAK_TIMEOUT:2s}
app.invitation.ttl=${APP_INVITATION_TTL:48h}
app.invitation.signup-base-url=${APP_INVITATION_SIGNUP_BASE_URL:}
